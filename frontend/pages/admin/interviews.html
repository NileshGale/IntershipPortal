<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Schedule | Admin</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body class="layout-admin">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-wrapper">
        <div class="topbar" id="topbar"></div>
        <div class="page-content">
            <div class="tabs">
                <button class="tab-btn active" data-tab="tab-calendar">Calendar View</button>
                <button class="tab-btn" data-tab="tab-list">List View</button>
            </div>

            <!-- Calendar View -->
            <div id="tab-calendar" class="tab-content active">
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title" id="calMonthYear">Loading...</h2>
                    </div>
                    <div class="calendar-grid">
                        <!-- Filled by JS -->
                    </div>
                </div>
            </div>

            <!-- List View -->
            <div id="tab-list" class="tab-content">
                <div class="card">
                    <div class="card-header"><h2 class="card-title">All Scheduled Interviews</h2></div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Schedule</th>
                                    <th>Company / Role</th>
                                    <th>Student</th>
                                    <th>Round Info</th>
                                    <th>Mode</th>
                                    <th>Status</th>
                                    <th>Student Response</th>
                                </tr>
                            </thead>
                            <tbody id="interviewsBody">
                                <tr><td colspan="7" class="text-center">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../../js/main.js"></script>
    <script src="../../js/admin.js"></script>
</body>
</html>
