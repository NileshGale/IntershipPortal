<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Documents | Student</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body class="layout-student">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-wrapper">
        <div class="topbar" id="topbar"></div>
        <div class="page-content">
            <div class="grid-2">
                <!-- Upload form -->
                <div class="card">
                    <div class="card-header"><h2 class="card-title">Upload New Document</h2></div>
                    <div class="alert alert-info">
                        Accepted formats: PDF, JPG, PNG. Max size: 5MB.<br>
                        <strong>Note:</strong> Companies can view your uploaded Resume.
                    </div>
                    <form id="uploadDocForm" enctype="multipart/form-data">
                        <div class="form-group">
                            <label class="form-label">Document Type</label>
                            <select name="doc_type" class="form-select" required>
                                <option value="Resume">Resume / CV</option>
                                <option value="10th Marksheet">10th Marksheet</option>
                                <option value="12th Marksheet">12th Marksheet</option>
                                <option value="UG Transcript">UG Transcript / Semester Marksheets</option>
                                <option value="Government ID">Government ID (Aadhar/PAN)</option>
                                <option value="Other">Other Certificate</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Select File</label>
                            <input type="file" name="document" class="form-control" accept=".pdf,.jpg,.jpeg,.png" required onchange="checkFileSize(this)">
                        </div>
                        <button type="submit" class="btn btn-primary">Upload Document</button>
                    </form>
                </div>

                <!-- Document List -->
                <div class="card">
                    <div class="card-header"><h3 class="card-title">My Uploaded Documents</h3></div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Type</th>
                                    <th>File Name</th>
                                    <th>Uploaded On</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="docsBody">
                                <tr><td colspan="4" class="text-center">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../../js/main.js"></script>
    <script src="../../js/student.js"></script>
</body>
</html>
