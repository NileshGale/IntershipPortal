<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Interviews | Student</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body class="layout-student">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-wrapper">
        <div class="topbar" id="topbar"></div>
        <div class="page-content">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Interview Schedules</h2>
                </div>
                
                <div class="alert alert-info">
                    <strong>Tip:</strong> Please accept or decline interviews as early as possible so recruiters can plan accordingly. Maintain professionalism by joining 5 minutes early for online interviews.
                </div>

                <div class="table-wrapper mt-4">
                    <table>
                        <thead>
                            <tr>
                                <th>Date & Time</th>
                                <th>Company / Role</th>
                                <th>Round</th>
                                <th>Mode</th>
                                <th>Location / Link</th>
                                <th>Overall Status</th>
                                <th>Your Response</th>
                            </tr>
                        </thead>
                        <tbody id="interviewsBody">
                            <tr><td colspan="7" class="text-center">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="../../js/main.js"></script>
    <script src="../../js/student.js"></script>
</body>
</html>
