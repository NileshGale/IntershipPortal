<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Drives | Admin</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
            z-index: 2000; align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: var(--surface); border-radius: var(--radius); padding: 28px;
            width: 100%; max-width: 540px; box-shadow: var(--shadow-lg);
            max-height: 90vh; overflow-y: auto; animation: slideUp .25s ease;
        }
        @keyframes slideUp { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border);
        }
        .modal-header h3 { font-size: 1.05rem; font-weight: 700; }
        .modal-close {
            background: none; border: none; font-size: 1.3rem; cursor: pointer;
            color: var(--text-muted); transition: color .2s;
        }
        .modal-close:hover { color: var(--danger); }
    </style>
</head>
<body class="layout-admin">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-wrapper">
        <div class="topbar" id="topbar"></div>
        <div class="page-content">
            <div class="grid-2">
                <div class="card">
                    <div class="card-header"><h2 class="card-title">Schedule Placement Drive</h2></div>
                    <form id="addDriveForm">
                        <div class="form-group">
                            <label class="form-label">Drive Title</label>
                            <input type="text" name="title" class="form-control" required placeholder="e.g. Mega Pool Drive 2025">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Sponsoring Company (Optional)</label>
                            <select name="company_id" class="form-select">
                                <option value="">-- None (Open for multiple) --</option>
                            </select>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Drive Date</label>
                                <input type="date" name="drive_date" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Venue</label>
                                <input type="text" name="venue" class="form-control" placeholder="Main Auditorium">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Eligibility Criteria</label>
                            <textarea name="eligibility" class="form-control" placeholder="e.g. CSE/IT with >7 CGPA"></textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Selection Rounds</label>
                            <textarea name="rounds" class="form-control" placeholder="1. Aptitude&#10;2. Tech Interview&#10;3. HR"></textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Description / Instructions</label>
                            <textarea name="description" class="form-control"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Schedule Drive</button>
                    </form>
                </div>

                <div class="card">
                    <div class="card-header"><h3 class="card-title">Placement Drives List</h3></div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Drive Details</th>
                                    <th>Date</th>
                                    <th>Venue</th>
                                    <th>Applicants</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="drivesBody">
                                <tr><td colspan="5" class="text-center">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Applicants Modal -->
    <div class="modal-overlay" id="applicantsModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3>👥 Registered Applicants</h3>
                <button class="modal-close" onclick="document.getElementById('applicantsModal').classList.remove('open')">&times;</button>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Student</th><th>Roll No.</th><th>Branch</th><th>CGPA</th></tr></thead>
                    <tbody id="appModalBody">
                        <tr><td colspan="4" class="text-center">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="../../js/main.js"></script>
    <script src="../../js/admin.js"></script>
</body>
</html>
