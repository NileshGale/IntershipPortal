<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcements | Admin</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body class="layout-admin">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-wrapper">
        <div class="topbar" id="topbar"></div>
        <div class="page-content">
            <div class="grid-2">
                <div class="card">
                    <div class="card-header"><h2 class="card-title">Post Announcement</h2></div>
                    <form id="addAnnouncementForm">
                        <div class="form-group">
                            <label class="form-label">Title</label>
                            <input type="text" name="title" class="form-control" required placeholder="Important Notice">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Target Audience</label>
                                <select name="target_role" class="form-select" required>
                                    <option value="all">All Users</option>
                                    <option value="student">Students Only</option>
                                    <option value="company">Companies Only</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Priority</label>
                                <select name="priority" class="form-select">
                                    <option value="Normal">Normal</option>
                                    <option value="High">High</option>
                                    <option value="Urgent">Urgent</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Message Content</label>
                            <textarea name="content" class="form-control" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Publish Announcement</button>
                    </form>
                </div>

                <div class="card">
                    <div class="card-header"><h3 class="card-title">Recent Announcements</h3></div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Announcement</th>
                                    <th>Target</th>
                                    <th>Priority</th>
                                    <th>Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="announcementsBody">
                                <tr><td colspan="5" class="text-center">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../../js/main.js"></script>
    <script src="../../js/admin.js"></script>
</body>
</html>
