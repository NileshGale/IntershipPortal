<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Placement | Student</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body class="layout-student">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-wrapper">
        <div class="topbar" id="topbar"></div>
        <div class="page-content">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Placement Records</h2>
                </div>
                
                <div class="table-wrapper mt-4">
                    <table>
                        <thead>
                            <tr>
                                <th>Company</th>
                                <th>Job Title</th>
                                <th>Package (LPA)</th>
                                <th>Joining Date</th>
                                <th>Status</th>
                                <th>Offer Letter & Actions</th>
                            </tr>
                        </thead>
                        <tbody id="placementsBody">
                            <tr><td colspan="6" class="text-center">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="alert alert-success mt-24">
                    <strong>Note:</strong> Once you are marked as 'Placed' and accepted an offer, you may be restricted from applying to further opportunities depending on the college's placement policy.
                </div>
            </div>
        </div>
    </div>
    <script src="../../js/main.js"></script>
    <script src="../../js/student.js"></script>
</body>
</html>
